name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm run check
      - run: npm test
      - name: Verify hosted MCP contract
        env:
          COLD_AGENT_API_KEY: ${{ secrets.COLD_AGENT_CONTRACT_API_KEY }}
        run: |
          if [[ -n "$COLD_AGENT_API_KEY" ]]; then
            npm run test:hosted
          else
            echo "Hosted contract check skipped: COLD_AGENT_CONTRACT_API_KEY is not configured."
          fi
